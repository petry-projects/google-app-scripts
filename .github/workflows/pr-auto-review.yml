name: PR Auto-Review — Ready Check

on:
  workflow_run:
    workflows:
      - 'CI Pipeline'
      - 'Node.js Tests'
      - 'Coverage'
      - 'SonarCloud Analysis'
      - 'Playwright UI Tests'
      - 'Dependency audit'
      - 'AgentShield'
    types: [completed]
  pull_request_review:
    types: [submitted, dismissed]
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions: {}

jobs:
  check-pat:
    runs-on: ubuntu-latest
    outputs:
      has_pat: ${{ steps.check.outputs.has_pat }}
    steps:
      - id: check
        env:
          GH_PAT_WORKFLOWS: ${{ secrets.GH_PAT_WORKFLOWS }}
        run: |
          if [ -n "$GH_PAT_WORKFLOWS" ]; then
            echo "has_pat=true" >> $GITHUB_OUTPUT
          else
            echo "has_pat=false" >> $GITHUB_OUTPUT
          fi

  pr-auto-review:
    needs: check-pat
    if: ${{ needs.check-pat.outputs.has_pat == 'true' && (github.event_name != 'pull_request' || (github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]')) }}
    permissions:
      pull-requests: read
      checks: read
      actions: read
    uses: petry-projects/.github/.github/workflows/pr-auto-review-reusable.yml@376a4fcb1117444595e3e702fa450873d0e54310
    secrets:
      GH_PAT_WORKFLOWS: ${{ secrets.GH_PAT_WORKFLOWS }}
