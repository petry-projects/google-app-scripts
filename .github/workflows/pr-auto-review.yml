name: PR Auto-Review — Ready Check

on:
  workflow_run:
    workflows:
      - 'CI Pipeline'
      - 'Node.js Tests'
      - 'Coverage'
      - 'SonarCloud Analysis'
      - 'Playwright UI Tests'
      - 'Dependency audit'
      - 'AgentShield'
    types: [completed]
  pull_request_review:
    types: [submitted, dismissed]
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions: {}

jobs:
  pr-auto-review:
    if: ${{ secrets.GH_PAT_WORKFLOWS != '' && (github.event_name != 'pull_request' || (github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]')) }}
    permissions:
      pull-requests: read
      checks: read
      actions: read
    uses: petry-projects/.github/.github/workflows/pr-auto-review-reusable.yml@376a4fcb1117444595e3e702fa450873d0e54310
    secrets:
      GH_PAT_WORKFLOWS: ${{ secrets.GH_PAT_WORKFLOWS }}
